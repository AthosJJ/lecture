<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Lecture</title>
  <meta name="description" content="Ma liste de lecture — notes et citations, hors ligne.">

  <meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Lecture">

  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">

    <!-- ÉCRAN : Bibliothèque -->
    <section class="view" id="view-library" aria-label="Bibliothèque">
      <header class="page-head">
        <h1>Bibliothèque</h1>
        <button class="icon-btn" id="btn-add-book" aria-label="Ajouter un livre ou un article">
          <svg viewBox="0 0 20 20" width="20" height="20" aria-hidden="true"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
        </button>
      </header>
      <div class="search-wrap">
        <svg class="search-ico" viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M13 13l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input id="search-input" type="search" placeholder="Titre, auteur, note, citation…" autocomplete="off">
      </div>
      <div class="chips" id="library-tags" hidden></div>
      <div id="library-list"></div>
    </section>

    <!-- ÉCRAN : Toutes les citations -->
    <section class="view" id="view-quotes" aria-label="Citations">
      <header class="page-head">
        <h1>Citations</h1>
      </header>
      <div class="filters-row">
        <select id="quotes-book-filter" aria-label="Filtrer par livre">
          <option value="">Tous les livres</option>
        </select>
      </div>
      <div class="chips" id="quotes-tags" hidden></div>
      <div id="quotes-list"></div>
    </section>

    <!-- ÉCRAN : Statistiques + données -->
    <section class="view" id="view-stats" aria-label="Statistiques">
      <header class="page-head">
        <h1>Statistiques</h1>
      </header>
      <div id="stats-content"></div>
      <div class="data-section">
        <h2 class="section-title">Données</h2>
        <button class="row-btn" id="btn-export-md">Exporter notes &amp; citations (Markdown)</button>
        <button class="row-btn" id="btn-export-json">Sauvegarder tout (JSON)</button>
        <button class="row-btn" id="btn-import-json">Restaurer une sauvegarde (JSON)</button>
        <button class="row-btn" id="btn-update-app">Rechercher une mise à jour</button>
        <input type="file" id="import-file" accept="application/json,.json" hidden>
        <p class="hint">Les données restent sur cet appareil. Pensez à exporter une sauvegarde régulièrement : iOS peut effacer le stockage d'une app web inutilisée.</p>
        <p class="hint" id="version-line"></p>
      </div>
    </section>

    <!-- ÉCRAN : Fiche d'un livre -->
    <section class="view view-push" id="view-book" aria-label="Fiche du livre">
      <header class="page-head detail-head">
        <button class="back-btn" id="btn-back" aria-label="Retour">
          <svg viewBox="0 0 20 20" width="18" height="18" aria-hidden="true"><path d="M12.5 4 6.5 10l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <span>Retour</span>
        </button>
        <button class="text-btn" id="btn-edit-book">Modifier</button>
      </header>
      <div id="book-content"></div>
      <div class="segmented" id="book-tabs" role="tablist">
        <button class="seg-btn active" data-tab="notes" role="tab" aria-selected="true">Notes</button>
        <button class="seg-btn" data-tab="quotes" role="tab" aria-selected="false">Citations</button>
      </div>
      <div id="book-tab-content"></div>
      <div class="detail-actions">
        <button class="primary-btn" id="btn-add-entry">+ Note</button>
        <button class="row-btn small" id="btn-export-book">Exporter cette fiche (.md)</button>
      </div>
    </section>

    <!-- Barre d'onglets -->
    <nav class="tabbar" id="tabbar">
      <a href="#/library" class="tab" data-route="library">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M5 4.5h5.2c1 0 1.8.8 1.8 1.8v13.2c-.6-.8-1.6-1.3-2.7-1.3H5V4.5Zm14 0h-5.2c-1 0-1.8.8-1.8 1.8v13.2c.6-.8 1.6-1.3 2.7-1.3H19V4.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" fill="none"/></svg>
        <span>Bibliothèque</span>
      </a>
      <a href="#/quotes" class="tab" data-route="quotes">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M9.5 7.5c-2.6.6-4 2.4-4 5v4h5v-5H7.6c.1-1.6 1-2.6 2.4-3l-.5-1Zm9 0c-2.6.6-4 2.4-4 5v4h5v-5h-2.9c.1-1.6 1-2.6 2.4-3l-.5-1Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/></svg>
        <span>Citations</span>
      </a>
      <a href="#/stats" class="tab" data-route="stats">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M5 19V12M12 19V5m7 14v-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
        <span>Stats</span>
      </a>
    </nav>

    <!-- Voile + feuilles modales -->
    <div class="backdrop" id="backdrop" hidden></div>

    <div class="sheet" id="sheet-book" role="dialog" aria-modal="true" aria-labelledby="sheet-book-title" hidden>
      <div class="sheet-handle"></div>
      <h2 id="sheet-book-title">Nouveau livre</h2>
      <form id="form-book" novalidate>
        <div class="segmented small-seg" id="field-type">
          <button type="button" class="seg-btn active" data-value="book">Livre</button>
          <button type="button" class="seg-btn" data-value="article">Article</button>
        </div>
        <label class="field">
          <span>Titre *</span>
          <input name="title" type="text" required autocomplete="off">
        </label>
        <label class="field">
          <span>Auteur</span>
          <input name="author" type="text" autocomplete="off">
        </label>
        <div class="segmented small-seg" id="field-status">
          <button type="button" class="seg-btn active" data-value="toread">À lire</button>
          <button type="button" class="seg-btn" data-value="reading">En cours</button>
          <button type="button" class="seg-btn" data-value="done">Terminé</button>
        </div>
        <div class="field-row">
          <label class="field">
            <span>Page actuelle</span>
            <input name="currentPage" type="number" min="0" inputmode="numeric">
          </label>
          <label class="field">
            <span>Pages total</span>
            <input name="totalPages" type="number" min="1" inputmode="numeric">
          </label>
        </div>
        <div class="field-row">
          <label class="field">
            <span>Début de lecture</span>
            <input name="startDate" type="date">
          </label>
          <label class="field">
            <span>Fin de lecture</span>
            <input name="endDate" type="date">
          </label>
        </div>
        <label class="field">
          <span>Tags <small>(séparés par des virgules)</small></span>
          <input name="tags" type="text" autocomplete="off" placeholder="roman, philosophie…">
        </label>
        <div class="field" id="rating-field" hidden>
          <span>Note</span>
          <div class="stars" id="rating-stars" role="radiogroup" aria-label="Note sur 5">
            <button type="button" data-v="1" aria-label="1 étoile">★</button><button type="button" data-v="2" aria-label="2 étoiles">★</button><button type="button" data-v="3" aria-label="3 étoiles">★</button><button type="button" data-v="4" aria-label="4 étoiles">★</button><button type="button" data-v="5" aria-label="5 étoiles">★</button>
          </div>
        </div>
        <button type="submit" class="primary-btn">Enregistrer</button>
        <button type="button" class="danger-btn" id="btn-delete-book" hidden>Supprimer</button>
      </form>
    </div>

    <div class="sheet" id="sheet-note" role="dialog" aria-modal="true" aria-labelledby="sheet-note-title" hidden>
      <div class="sheet-handle"></div>
      <h2 id="sheet-note-title">Nouvelle note</h2>
      <form id="form-note" novalidate>
        <label class="field">
          <span>Note</span>
          <textarea name="text" rows="6" required placeholder="Vos réflexions…"></textarea>
        </label>
        <div class="capture-row">
          <button type="button" class="cap-btn" id="btn-dictate-note">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><rect x="9" y="3" width="6" height="11" rx="3" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M5.5 11.5a6.5 6.5 0 0 0 13 0M12 18.5V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
            <span class="cap-label">Dicter</span>
          </button>
        </div>
        <button type="submit" class="primary-btn">Enregistrer</button>
        <button type="button" class="danger-btn" id="btn-delete-note" hidden>Supprimer</button>
      </form>
    </div>

    <div class="sheet" id="sheet-quote" role="dialog" aria-modal="true" aria-labelledby="sheet-quote-title" hidden>
      <div class="sheet-handle"></div>
      <h2 id="sheet-quote-title">Nouvelle citation</h2>
      <form id="form-quote" novalidate>
        <label class="field">
          <span>Citation *</span>
          <textarea name="text" rows="5" required placeholder="« … »"></textarea>
        </label>
        <div class="capture-row">
          <button type="button" class="cap-btn" id="btn-dictate-quote">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><rect x="9" y="3" width="6" height="11" rx="3" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M5.5 11.5a6.5 6.5 0 0 0 13 0M12 18.5V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
            <span class="cap-label">Dicter</span>
          </button>
          <button type="button" class="cap-btn" id="btn-scan-quote">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M4 7.5h3.2L9 5.5h6l1.8 2H20a0 0 0 0 1 0 0v11H4v-11Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/><circle cx="12" cy="12.5" r="3.2" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
            <span class="cap-label">Scanner du texte</span>
          </button>
        </div>
        <div class="ocr-panel" id="ocr-panel" hidden>
          <p class="ocr-status" id="ocr-status"></p>
          <img id="ocr-photo" class="ocr-photo" alt="Photo à reconnaître" hidden>
          <div class="ocr-lines" id="ocr-lines"></div>
          <div class="ocr-actions" id="ocr-actions" hidden>
            <button type="button" class="primary-btn small" id="ocr-insert">Insérer la sélection</button>
            <button type="button" class="row-btn small" id="ocr-cancel">Annuler</button>
          </div>
        </div>
        <input type="file" id="ocr-file" accept="image/*" hidden>
        <div class="field-row">
          <label class="field">
            <span>Page</span>
            <input name="page" type="number" min="0" inputmode="numeric">
          </label>
          <label class="field">
            <span>Tags <small>(virgules)</small></span>
            <input name="tags" type="text" autocomplete="off">
          </label>
        </div>
        <button type="submit" class="primary-btn">Enregistrer</button>
        <button type="button" class="danger-btn" id="btn-delete-quote" hidden>Supprimer</button>
      </form>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <noscript><p style="padding:2rem;text-align:center">Cette application nécessite JavaScript.</p></noscript>
  <script type="module" src="./app.js"></script>
</body>
</html>
